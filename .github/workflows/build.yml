name: Build and publish Docker image to github registry if changed

on:
  push:
    paths-ignore:
      - '**/build.yml'
      - '**/README.md'
      - '**/*.py'
      - '*.txt'
    branches: ['main']
  workflow_dispatch:
    inputs:
      tools:
        description: 'Space-separated list of tools to build (leave blank for all)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  find-out-changed:
    runs-on: ubuntu-latest
    outputs:
      changed_directories: ${{ steps.set-output.outputs.changed_directories }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed directories via git diff
        id: set-output
        run: |
          # On workflow_dispatch, use tools input or build all containers/
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.tools }}" ]; then
              DIRS=$(echo "${{ github.event.inputs.tools }}" | tr ' ' '\n' | jq -R '.' | jq -sc '.')
            else
              DIRS=$(find containers/ -mindepth 1 -maxdepth 1 -type d | cut -d'/' -f2 | sort -u | jq -R '.' | jq -sc '.')
            fi
          else
            DIRS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^containers/' \
              | xargs -I{} dirname {} \
              | cut -d'/' -f2 \
              | sort -u \
              | jq -R '.' \
              | jq -sc '.')
          fi

          if [ -z "$DIRS" ] || [ "$DIRS" = "[]" ]; then
            echo "changed_directories=" >> "$GITHUB_OUTPUT"
          else
            echo "changed_directories={\"dir\":$DIRS}" >> "$GITHUB_OUTPUT"
          fi

  build-push-changed:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    needs: find-out-changed
    if: ${{ needs.find-out-changed.outputs.changed_directories != '' }}
    strategy:
      max-parallel: 4
      matrix: ${{ fromJson(needs.find-out-changed.outputs.changed_directories) }}
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix variables
        id: changes-matrix
        run: |
          echo "test={\"dockerfile\":\"containers/${{ matrix.dir }}/Dockerfile\", \"context\":\"containers/${{ matrix.dir }}\", \"image\":\"${{ env.REGISTRY }}/bf528/${{ matrix.dir }}:latest\"}" >> "$GITHUB_OUTPUT"
          VERSION=$(cat containers/${{ matrix.dir }}/version.txt 2>/dev/null || echo "")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ fromJSON(steps.changes-matrix.outputs.test).context }}
          file: ${{ fromJSON(steps.changes-matrix.outputs.test).dockerfile }}
          push: true
          tags: |
            ${{ fromJSON(steps.changes-matrix.outputs.test).image }}
            ${{ env.REGISTRY }}/bf528/${{ matrix.dir }}:${{ github.sha }}
            ${{ steps.changes-matrix.outputs.version != '' && format('{0}/bf528/{1}:{2}', env.REGISTRY, matrix.dir, steps.changes-matrix.outputs.version) || '' }}

      - name: Test container
        run: |
          TESTS_FILE="containers/${{ matrix.dir }}/tests.yml"
          if [ ! -f "$TESTS_FILE" ]; then
            echo "No tests.yml found for ${{ matrix.dir }}, skipping"
            exit 0
          fi
          CMD=$(python3 -c "import yaml; print(yaml.safe_load(open('$TESTS_FILE'))['command'])")
          echo "Running: $CMD"
          docker run --rm ${{ fromJSON(steps.changes-matrix.outputs.test).image }} bash -c "$CMD"